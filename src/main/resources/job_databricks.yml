jobName: databricksJob
engine: databricks
job:
  - input:
      df-name: dbread
      type: databricks
      identifier: dev
      table: deliveries
      schema: ipl

  - input:
      df-name: books
      type: file
      identifier: local
      option: |
        delimiter=,
        header=true
      path: D:/SampleData/IPL/matches.csv

  - transform:
      df-name: t1
      t_inputs: dbread
      query: Select * from dbread
      output: out-01

  - output:
      df-name: out-01
      type: file
      identifier: local
      path: D:\SampleData\mysql_sample_data_1

