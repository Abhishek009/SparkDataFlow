jobName: DatabricksJob
engine: databricks
job:
  - input:
      df-name: dbread
      type: databricks
      identifier: dev
      table: deliveries
      schema: ipl

  - input:
      df-name: fileread
      type: file
      identifier: local
      path: D:/SampleData/IPL/matches.csv

  - transform:
      df-name: t1
      t_inputs: dbread,fileread
      query: '--file D:/Google_Drive_Rahul/GitHub/SparkDataFlow/sql/sample.sql'
      output: out-01

  - output:
      df-name: out-01
      type: file
      identifier: adfss
      partition: ods
      path: D:\SampleData\mysql_sample_data_1

  - output:
      df-name: out-01
      type: databricks
      identifier: dev
      partition: ods
      schema: deliveries
      table: iploutput

