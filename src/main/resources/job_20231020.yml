# Input: Job file to read the data from a mysql table and Read the data from a file
# Transform 1: Join operation on file and mysql table
# Transform 2: Join operation on file and mysql table
# Output: Writes the output of transformation 1 to local file
# Output: Writes the output of transformation 2 to  mysql table abc.zxc

jobName: mysqltolocal

job:
  - input:
      df-name: mysqlread
      type: jdbc
      identifier: mysql
      table: ccms_tran_sg
      schema: prd_datahub
  - input:
      df-name: books
      type: file
      identifier: local
      option: delimiter=,$header=true
      path: D:/SampleData/IPL/matches.csv

  - transform:
      df-name: t1
      t_inputs: mysqlread,books
      query: "Select * from mysqlread join books on mysqlread.a=books.b "
      output: out-01

  - transform:
      df-name: t2
      t_inputs: t1
      query: select count(*) from t1;
      output: out-02

  - output:
      df-name: out-01
      type: file
      identifier: local
      path: some local path to overwrite the original value.

  - output:
      df-name: out-02
      type: msql
      identifier: mysqlread
      table: zxc
      schema: abc