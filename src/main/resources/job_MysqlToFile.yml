# Input: Sql Database
# Transform: Select operation
# Output: Writes the output of transformation  to local file

jobName: mysqltolocal

job:
  - input:
      df-name: mysql_customer_info
      type: jdbc
      identifier: mysql
      table: cust_info
      schema: customer

  - transform:
        df-name: t1
        t_inputs: mysql_customer_info
        query: "Select * from mysql_customer_info"
        output: out-01

  - output:
      df-name: out-01
      type: file
      identifier: local
      path: D:\SampleData\mysql_customer_info
      output_format: csv
      mode: overwrite

